<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPOTIFY CLONE</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="utility.css" />
  </head>
  <body>
    <div class="container flex bg-black">
      <div class="left">
        <div class="home rounded bg-grey m-1 p-1">
          <div class="sp-logo flex">
            <img class="invert" src="logo.svg" alt="logo svg" />
            <h2>Spotify</h2>
          </div>
          <ul>
            <li>
              <img class="invert" src="home.svg" alt="home icon svg" />Home
            </li>
            <li>
              <img
                class="invert"
                src="search.svg"
                alt="search icon svg"
              />Search
            </li>
          </ul>
        </div>
        <div class="library bg-grey rounded m-1 p-1">
          <div class="heading">
            <img class="invert" src="playlist.svg" alt="" />
            <h2>Your library</h2>
          </div>
          <div class="footer">
            <a href="https://www.spotify.com/in-en/legal/">
              <span>Legal</span>
            </a>

            <a href="https://www.spotify.com/in-en/safetyandprivacy/">
              <span>Safety & Privacy Center</span>
            </a>

            <a href="https://www.spotify.com/in-en/legal/privacy-policy/">
              <span>Privacy Policy</span>
            </a>
            <a href="https://www.spotify.com/in-en/legal/cookies-policy/">
              <span>Cookies</span>
            </a>
            <a href="https://www.spotify.com/in-en/legal/privacy-policy/#s3">
              <span>About Ads</span>
            </a>

            <a href="https://www.spotify.com/in-en/accessibility/">
              <span>Accessibility</span>
            </a>
            <a
              href="https://www.spotify.com/legal/cookies-policy/"
              target="_blank"
              rel="noopener"
            >
              <span>Cookies</span>
            </a>
          </div>
        </div>
      </div>
      <div class="right rounded bg-grey">
        <div class="nav flex">
          <img src="left-arrow.svg" alt="left-arrow-svg" />
          <img src="right-arrow.svg" alt="right-arrow-svg" />
        </div>
      </div>
    </div>
  </body>
</html>
