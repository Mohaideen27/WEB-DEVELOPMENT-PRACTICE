<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS FILTERS</title>
    <style>
      .img {
        /* height: 200px; */
        filter: blur(0.75px) invert(100%);
      }
      .img2 {
        filter: contrast(0.5) grayscale(100%);
      }
      .img3 {
        filter: brightness(123%) blur(0.75px) sepia(40%);
      }
    </style>
  </head>
  <body>
    <div class="containter img">
      <img src="image1.png" alt="SAMPLE-IMG" />
    </div>
    <div class="container">
      <img class="img2" style="height: 250px" src="image2.png" alt="SAMPLE-2" />
      <img class="img3" style="height: 250px" src="image3.png" alt="SAMPLE-3" />
    </div>
  </body>
</html>
