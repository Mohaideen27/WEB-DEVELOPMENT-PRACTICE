<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        display: flex;
        border: 2px dashed brown;
        justify-items: center;
        flex-direction: row;
        margin: 20px;
      }
      .box {
        /* display: flex; */
        margin: 20px;
        box-sizing: border-box;
        height: 50px;
        width: 50px;
        background-color: antiquewhite;
        border: 1px solid grey;
        /* transform: rotate(45deg); */
        /* transform: rotate(0.2turn); */
      }
      .box1 {
        /* display: flex; */
        margin: 20px;
        box-sizing: border-box;
        height: 50px;
        width: 50px;
        background-color: antiquewhite;
        border: 1px solid grey;
        /* transform: rotate(45deg); */
        transform: rotate(0.2turn);
      }
      .box2 {
        /* display: flex; */
        margin: 20px;
        box-sizing: border-box;
        height: 50px;
        width: 50px;
        background-color: antiquewhite;
        border: 1px solid grey;
        /* transform: rotate(45deg); */
        transform: rotate(0.4turn);
      }
      .box3 {
        /* display: flex; */
        margin: 20px;
        box-sizing: border-box;
        height: 50px;
        width: 50px;
        background-color: antiquewhite;
        border: 1px solid grey;
        /* transform: rotate(45deg); */
        transform: rotate(0.6turn);
      }
      .box4 {
        /* display: flex; */
        margin: 20px;
        box-sizing: border-box;
        height: 50px;
        width: 50px;
        background-color: antiquewhite;
        border: 1px solid grey;
        /* transform: rotate(45deg); */
        transform: rotate(0.8turn);
      }
      .box00 {
        /* display: flex; */
        margin: 20px;
        box-sizing: border-box;
        height: 50px;
        width: 50px;
        background-color: antiquewhite;
        border: 1px solid grey;
        /* transform: rotate(45deg); */
        /* transform: rotate(0.2turn); */
        /* transform: rotateX('45deg'); */
      }
      .box10 {
        /* display: flex; */
        margin: 20px;
        box-sizing: border-box;
        height: 50px;
        width: 50px;
        background-color: antiquewhite;
        border: 1px solid grey;
        /* transform: rotate(45deg); */
        transform: rotateX(45deg);
        /* transform: rotate(0.2turn); */
      }
      .box20 {
        /* display: flex; */
        margin: 20px;
        box-sizing: border-box;
        height: 50px;
        width: 50px;
        background-color: antiquewhite;
        border: 1px solid grey;
        /* transform: rotate(45deg); */
        /* transform: rotate(0.4turn); */
        transform: rotateY(45deg);
      }
      .box30 {
        /* display: flex; */
        margin: 20px;
        box-sizing: border-box;
        height: 50px;
        width: 50px;
        background-color: antiquewhite;
        border: 1px solid grey;
        /* transform: rotate(45deg); */
        transform: rotateZ(45deg);
      }
      .box40 {
        /* display: flex; */
        margin: 20px;
        box-sizing: border-box;
        height: 50px;
        width: 50px;
        background-color: antiquewhite;
        border: 1px solid grey;
        /* transform: rotate(45deg); */
        /* transform: rotate(0.8turn); */
      }

      .cell {
        /* display: flex; */
        margin: 20px;
        box-sizing: border-box;
        height: 50px;
        width: 50px;
        background-color: antiquewhite;
        border: 1px solid grey;
      }

      .scale1 {
        transform: scaleX(1.6);
      }

      .scale2 {
        transform: scaleY(1.5);
      }
      .skew {
        transform: skew(40deg);
      }
      .skewx {
        transform: skewX(34deg);
      }

      .skewy {
        transform: skewY(30deg);
      }
      .translatepx {
        transform: translate(50px);
      }
      .translateper {
        transform: translate(50%);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box"></div>
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box3"></div>
      <div class="box4"></div>
    </div>
    <div class="container">
      <div class="box00"></div>
      <div class="box10">X</div>
      <div class="box20">Y</div>
      <div class="box30">Z</div>
      <div class="box40"></div>
    </div>
    <div class="container">
      <div class="cell scale1">X1.6</div>
      <div class="cell scale2">Y1.5</div>
      <div class="cell skew">skew 40 deg</div>
      <div class="cell skewx">skewx 34 deg</div>
      <div class="cell skewy">skewy 30 deg</div>
    </div>
    <div class="container">
      <div class="cell">normal</div>
      <div class="cell translatepx">translate30px</div>
      <div class="cell translateper">skew 40 deg</div>
      <div class="cell skewx">skewx 34 deg</div>
      <div class="cell skewy">skewy 30 deg</div>
    </div>
  </body>
</html>
